name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Get date for cache key
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache libimobiledevice tools
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: .cache/libimobiledevice
          key: libimobiledevice-${{ hashFiles('Scripts/setup.sh') }}-${{ steps.date.outputs.date }}
          restore-keys: |
            libimobiledevice-${{ hashFiles('Scripts/setup.sh') }}-

      - name: Fetch libimobiledevice tools
        if: steps.cache-libs.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash Scripts/setup.sh

      - name: Cache Xcode derived data
        uses: actions/cache@v4
        with:
          path: build
          key: xcode-build-${{ runner.os }}-${{ hashFiles('**/*.swift', '**/*.xcodeproj/**', '*.xcworkspace/**') }}
          restore-keys: |
            xcode-build-${{ runner.os }}-

      - name: Install certificate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          P12_BASE64: ${{ secrets.CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          echo "Installed identities:"
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Build (Release)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild build \
            -project Mooring.xcodeproj \
            -scheme Mooring \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

      - name: Build
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          xcodebuild build \
            -project Mooring.xcodeproj \
            -scheme Mooring \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip app
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build/Build/Products/Release
          /usr/bin/ditto -c -k --keepParent Mooring.app "$GITHUB_WORKSPACE/Mooring.zip"

      - name: Notarize
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: |
          set -e
          xcrun notarytool submit Mooring.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --wait \
            --output-format json | tee /tmp/notarize.json
          STATUS=$(cat /tmp/notarize.json | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "Accepted" ]; then
            ID=$(cat /tmp/notarize.json | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$NOTARIZATION_PASSWORD"
            exit 1
          fi

      - name: Staple and re-zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build/Build/Products/Release
          for i in 1 2 3; do
            xcrun stapler staple Mooring.app && break
            echo "Staple attempt $i failed, retrying in 15s..."
            sleep 15
          done
          /usr/bin/ditto -c -k --keepParent Mooring.app "$GITHUB_WORKSPACE/Mooring.zip"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Mooring.zip
          generate_release_notes: true
