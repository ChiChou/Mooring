name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Get date for cache key
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache libimobiledevice tools
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: .cache/libimobiledevice
          key: libimobiledevice-${{ hashFiles('Scripts/setup.sh') }}-${{ steps.date.outputs.date }}
          restore-keys: |
            libimobiledevice-${{ hashFiles('Scripts/setup.sh') }}-

      - name: Fetch libimobiledevice tools
        if: steps.cache-libs.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash Scripts/setup.sh

      - name: Cache Xcode derived data
        uses: actions/cache@v4
        with:
          path: build
          key: xcode-build-${{ runner.os }}-${{ hashFiles('**/*.swift', '**/*.xcodeproj/**', '*.xcworkspace/**') }}
          restore-keys: |
            xcode-build-${{ runner.os }}-

      - name: Build
        run: |
          xcodebuild build \
            -project Mooring.xcodeproj \
            -scheme Mooring \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip app
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/Mooring.zip" Mooring.app

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Mooring.zip
          generate_release_notes: true
